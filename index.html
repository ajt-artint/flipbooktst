<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flipbook</title>

<link rel="stylesheet" href="https://unpkg.com/page-flip/dist/page-flip.min.css">
<script src="https://unpkg.com/page-flip/dist/page-flip.browser.min.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #f4f4f4;
    height: 100%;
  }

  #flipbook {
    width: 100vw;
    height: 75vw;
    max-width: 1200px;
    max-height: 900px;
    margin: auto;
  }

  .page {
    background: white;
    padding: 24px;
    box-sizing: border-box;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .page img {
    width: 100%;
    border-radius: 6px;
  }

  .page h2 {
    margin: 0;
    font-size: 1.6rem;
  }

  .page p {
    font-size: 1rem;
    line-height: 1.5;
  }
</style>
</head>

<body>

<div id="flipbook"></div>

<script>
  const pages = [];
  for (let i = 1; i <= 15; i++) {
    const page = document.createElement("div");
    page.className = "page";
    page.innerHTML = `
      <h2>Page ${i}</h2>
      <img src="https://picsum.photos/800/600?random=${i}">
      <p>This is placeholder text for page ${i}. Replace this with your real content.</p>
    `;
    pages.push(page);
  }

  const book = new PageFlip(document.getElementById("flipbook"), {
    width: 800,
    height: 600,
    size: "stretch",
    showCover: true,
    flippingTime: 700,
    drawShadow: true,
    usePortrait: true
  });

  book.loadFromHTML(pages);
</script>

</body>
</html>
