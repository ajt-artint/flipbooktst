<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flipbook Test</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/page-flip.min.css">
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/page-flip.browser.min.js"></script>

  <style>
    body { margin: 0; background: #ddd; }
    #flipbook { width: 800px; height: 600px; margin: 40px auto; background: white; }
    .page { padding: 20px; font-family: sans-serif; }
  </style>
</head>

<body>

<div id="flipbook"></div>

<script>
  console.log("Script loaded");

  const pages = [];
  for (let i = 1; i <= 3; i++) {
    const p = document.createElement("div");
    p.className = "page";
    p.innerHTML = `<h2>Page ${i}</h2><p>Test page ${i}</p>`;
    pages.push(p);
  }

  console.log("Pages created:", pages.length);

  const container = document.getElementById("flipbook");
  console.log("Container:", container);

  const book = new PageFlip(container, {
    width: 800,
    height: 600
  });

  console.log("Book created:", book);

  book.loadFromHTML(pages);
  console.log("Pages loaded");
</script>

</body>
</html>
